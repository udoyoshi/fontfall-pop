<div style="width:100%;max-width:820px;margin:40px auto;background:#000;padding:20px 0;display:flex;justify-content:center;box-sizing:border-box;">
  <div style="position:relative;width:100%;max-width:800px;background:#000;border:4px solid #fff;overflow:hidden;">
    <canvas id="game" width="800" height="600" style="display:block;width:100%;height:auto;"></canvas>

    <div id="startScreen" style="position:absolute;inset:0;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;text-align:center;color:#0ff;">
      <h1 style="font-size:52px;margin:0;text-shadow:0 0 20px #f0f;font-family:'Shippori Mincho',serif;">知らんフォント</h1>
      <p style="margin:10px 0 30px;color:#ff0;">v3.3</p>
      <div style="max-width:520px;text-align:left;line-height:1.7;font-size:15.5px;color:#fff;border:2px solid #0ff;padding:20px;">
        上部の課題フォントと同じ書体の<span style="color:#ff0;">黄色い文字</span>を撃て！<br>
        正解12個で次のフォントへ
      </div>
      <button onclick="startGame()" style="margin-top:30px;padding:16px 70px;background:#000;color:#0f0;border:3px solid #0f0;font-size:26px;cursor:pointer;">▶ GAME START</button>
    </div>

    <div id="ui" style="display:none;position:absolute;top:0;left:0;right:0;z-index:50;pointer-events:none;color:#fff;">
      <div id="level" style="position:absolute;top:18px;left:30px;font-size:28px;color:#0ff;">LEVEL 1</div>
      <div id="score" style="position:absolute;top:18px;right:30px;font-size:38px;color:#ff0;">0</div>
      <div id="task" style="position:absolute;top:72px;left:50%;transform:translateX(-50%);font-size:54px;font-weight:bold;text-shadow:0 0 20px #ff0;"></div>
      <div id="missInfo" style="position:absolute;top:150px;left:50%;transform:translateX(-50%);font-size:28px;color:#f66;opacity:0;transition:opacity 0.6s;"></div>
    </div>

    <div id="clearScreen" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,0.92);z-index:100;display:flex;flex-direction:column;justify-content:center;align-items:center;">
      <h1 style="color:#f0f;font-size:48px;">TIME UP</h1>
      <p id="clearText" style="font-size:32px;margin:20px 0;color:#ff0;"></p>
      <button onclick="restartGame()" style="padding:14px 60px;background:#000;color:#0f0;border:3px solid #0f0;font-size:22px;cursor:pointer;">RESTART</button>
    </div>
  </div>
</div>

<script>
// v3.3 - 黒背景ネオン版
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

let score = 0, level = 1, timeLeft = 60, correctCount = 0, playerX = W/2 - 30;
let bullets = [], enemies = [], gameRunning = false, currentTaskIndex = 0;
let lastTime = Date.now();

const fonts = ["'Shippori Mincho', serif","'Noto Sans JP', sans-serif","'Kosugi Maru', sans-serif","'Yuji Syuku', cursive","'M PLUS Rounded 1c', sans-serif","'Shippori Mincho', serif"];
const taskNames = ["游明朝","源ノ角ゴシック","筑紫明朝","秀英明朝","AXIS Font","小塚明朝","リュウミン","IPA明朝"];
const chars = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわんアイウエオカキクケコABCDEFGHIJKLMNOPQRSTUVWXYZ!?".split("");

let audioCtx = null;
let isMuted = false;

function initAudio() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playSound(type) {
  if (isMuted || !audioCtx) return;
  const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.type = type === "hit" ? "sine" : "sawtooth";
  osc.frequency.value = type === "hit" ? 1600 : 820;
  g.gain.value = 0.3;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

function updateTaskDisplay() {
  const el = document.getElementById('task');
  el.style.fontFamily = fonts[currentTaskIndex % fonts.length];
  el.textContent = taskNames[currentTaskIndex % taskNames.length];
}

function drawPlayer() {
  ctx.save();
  ctx.translate(playerX + 30, H - 65);
  ctx.fillStyle = '#ff33aa';
  ctx.beginPath(); ctx.ellipse(0,0,28,22,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-10,-8,7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10,-8,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-10,-8,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10,-8,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function createEnemy() {
  const char = chars[Math.floor(Math.random()*chars.length)];
  const fi = Math.floor(Math.random()*fonts.length);
  const isCorrect = fi === (currentTaskIndex % fonts.length);
  enemies.push({x: Math.random()*(W-100)+50, y:-60, char, font:fonts[fi], size:42+Math.random()*22, speed:1.6+level*0.15, isCorrect});
}

function shoot() {
  bullets.push({x:playerX+30, y:H-90, speed:16});
  playSound("shoot");
}

function startGame() {
  if (!audioCtx) initAudio();
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  resetGame();
  gameRunning = true;
  lastTime = Date.now();
}

function resetGame() {
  score = 0; correctCount = 0; timeLeft = 60; level = 1;
  enemies = []; bullets = [];
  playerX = W/2 - 30;
  currentTaskIndex = 0;
  updateTaskDisplay();
}

function checkLevelUp() {
  if (correctCount >= 12) {
    currentTaskIndex = (currentTaskIndex + 1) % taskNames.length;
    correctCount = 0;
    level = Math.floor(currentTaskIndex / 3) + 1;
    updateTaskDisplay();
  }
}

function update() {
  if (!gameRunning) return;
  const now = Date.now();
  if (now - lastTime >= 1000) { timeLeft = Math.max(0, timeLeft-1); lastTime = now; }

  ctx.fillStyle = '#0a0014'; ctx.fillRect(0,0,W,H);

  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;
    ctx.save();
    ctx.font = `${e.size}px ${e.font}`;
    ctx.fillStyle = e.isCorrect ? '#ffee00' : '#ff66cc';
    ctx.shadowBlur = e.isCorrect ? 30 : 12;
    ctx.shadowColor = e.isCorrect ? '#ff0' : '#f0f';
    ctx.fillText(e.char, e.x, e.y);
    ctx.restore();
    if (e.y > H + 60) enemies.splice(i,1);
  }

  for (let i=bullets.length-1; i>=0; i--) {
    const b = bullets[i]; b.y -= b.speed;
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(b.x, b.y, 9, 0, Math.PI*2); ctx.fill();
    if (b.y < -30) {bullets.splice(i,1); continue;}

    for (let j=enemies.length-1; j>=0; j--) {
      const e = enemies[j];
      if (Math.hypot(b.x - e.x, b.y - e.y) < e.size*0.75) {
        if (e.isCorrect) {
          score += 150 + level*45;
          correctCount++;
          playSound("hit");
          checkLevelUp();
        } else {
          score = Math.max(0, score - 85);
          playSound("miss");
          const m = document.getElementById('missInfo');
          m.textContent = `× ${taskNames[fonts.indexOf(e.font)] || '誤フォント'}`;
          m.style.opacity = 1;
          setTimeout(() => m.style.opacity = 0, 1400);
        }
        enemies.splice(j,1); bullets.splice(i,1); break;
      }
    }
  }

  drawPlayer();

  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = `LEVEL ${level}`;

  if (timeLeft <= 0) {
    gameRunning = false;
    document.getElementById('clearText').innerHTML = `FINAL SCORE <b>${score}</b>`;
    document.getElementById('clearScreen').style.display = 'flex';
  }

  if (enemies.length < 8 && Math.random() < 0.28) createEnemy();
}

function loop() { update(); requestAnimationFrame(loop); }
function restartGame() {
  document.getElementById('clearScreen').style.display = 'none';
  document.getElementById('ui').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
}

loop();
</script>
</div>
