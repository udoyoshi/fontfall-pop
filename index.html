<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>書体撃ち - Fontfall Pop（v0.5）</title>
<style>
  body { margin:0; background:#111; font-family:sans-serif; color:white; overflow:hidden; }
  canvas { display:block; margin:0 auto; background:#000; touch-action:none; }
  #ui, #startScreen, #gameOverScreen {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 20; text-align: center;
  }
  #startScreen, #gameOverScreen { background: rgba(0,0,0,0.9); pointer-events: all; }
  button { padding: 16px 50px; font-size: 28px; background:#ff66aa; color:white; border:none; border-radius:50px; cursor:pointer; box-shadow:0 6px 0 #cc4488; }
  button:active { transform:translateY(3px); box-shadow:0 3px 0 #cc4488; }
  #task { font-size: 54px; font-weight:bold; text-shadow:0 0 20px #ff0; }
  #timer { font-size:42px; font-weight:bold; color:#ffff66; }
  #scoreDisplay { font-size:28px; font-weight:bold; }
</style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="startScreen">
  <h1 style="font-size:64px;color:#ff99ee;">書体撃ち</h1>
  <p style="font-size:26px;">Fontfall Pop</p>
  <button onclick="startGame()">▶ 60秒チャレンジ開始</button>
</div>

<div id="ui" style="display:none; pointer-events:none;">
  <div style="position:absolute;top:12px;left:15px;">レベル <span id="level">1</span></div>
  <div id="task" style="position:absolute;top:12px;left:50%;transform:translateX(-50%);"></div>
  <div id="scoreDisplay" style="position:absolute;top:12px;right:15px;"></div>
  <div id="timer" style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);">60</div>
</div>

<div id="gameOverScreen" style="display:none;">
  <h1 style="color:#ff6666;">タイムアップ！</h1>
  <p id="finalScore" style="font-size:38px;"></p>
  <button onclick="restartGame()">もう一度遊ぶ</button>
  <button onclick="showStartScreen()" style="background:#66aaff;margin-left:20px;">タイトルへ</button>
</div>

<script>
// =============== 書体撃ち v0.5 ===============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

let score = 0, level = 1, timeLeft = 60;
let playerX = W/2 - 30;
let bullets = [], enemies = [], enemyBullets = [], particles = [];
let gameRunning = false;
let currentTaskIndex = 0;
let penaltyMode = 0;

const fonts = [
  "'Noto Serif JP', serif",
  "'Noto Sans JP', sans-serif",
  "'Kosugi Maru', sans-serif",
  "'Yuji Syuku', cursive",
  "'M PLUS Rounded 1c', sans-serif",
  "serif", "sans-serif"
];

const chars = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわんアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワンABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!?".split("");

function getTaskName() {
  return ["明朝体","ゴシック体","丸ゴシック","手書き風","ポップ体","英字明朝"][currentTaskIndex % 6];
}

function updateTaskDisplay() {
  const el = document.getElementById('task');
  el.style.fontFamily = fonts[currentTaskIndex % fonts.length];
  el.textContent = getTaskName();
}

function drawPlayer(x) {
  ctx.save(); ctx.translate(x+30, H-60);
  ctx.fillStyle = '#ff66aa';
  ctx.beginPath(); ctx.ellipse(0,0,28,22,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-10,-8,7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10,-8,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-10,-8,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10,-8,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function createEnemy() {
  const char = chars[Math.floor(Math.random()*chars.length)];
  const fontIndex = Math.floor(Math.random()*fonts.length);
  enemies.push({
    x: Math.random()*(W-80)+40,
    y: -60,
    char: char,
    font: fonts[fontIndex],
    size: 34 + Math.random()*28,
    speed: 1.6 + level*0.22,
    isCorrect: fontIndex === (currentTaskIndex % fonts.length)
  });
}

function shoot() {
  bullets.push({x: playerX+30, y:H-85, speed:14});
  for (let i=0; i<6; i++) {
    particles.push({x:playerX+25+Math.random()*20-10, y:H-75, vx:Math.random()*7-3.5, vy:-3-Math.random()*5, life:20, color:'#222'});
  }
}

function createEnemyBullet(ex, ey) {
  enemyBullets.push({x:ex, y:ey, speed:5.8});
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  resetGameState();
  gameRunning = true;
}

function resetGameState() {
  score = 0; level = 1; timeLeft = 60; currentTaskIndex = 0;
  bullets = []; enemies = []; enemyBullets = []; particles = [];
  playerX = W/2 - 30; penaltyMode = 0;
  updateTaskDisplay();
}

function endGame() {
  gameRunning = false;
  document.getElementById('finalScore').innerHTML = `最終スコア: ${score}<br>レベル: ${level}`;
  document.getElementById('gameOverScreen').style.display = 'flex';
}

function restartGame() {
  document.getElementById('gameOverScreen').style.display = 'none';
  startGame();
}

function showStartScreen() {
  document.getElementById('gameOverScreen').style.display = 'none';
  document.getElementById('ui').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
}

function update() {
  if (!gameRunning) return;

  ctx.fillStyle = '#fff0e0'; ctx.fillRect(0,0,W,H);
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#ff99ee'); g.addColorStop(1,'#88ddff');
  ctx.globalAlpha = 0.35; ctx.fillStyle = g; ctx.fillRect(0,0,W,H); ctx.globalAlpha = 1;

  // タイマー
  if (Math.random() < 0.017) timeLeft--;
  document.getElementById('timer').textContent = timeLeft;
  if (timeLeft <= 0) endGame();

  // 敵（下まで到達しても減点なし・ゲームオーバーなし）
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;

    ctx.save();
    ctx.font = `${e.size}px ${e.font}`;
    ctx.fillStyle = e.isCorrect ? '#ffee44' : '#ff99dd';
    ctx.shadowBlur = 20; ctx.shadowColor = e.isCorrect ? '#ff0' : '#f0f';
    ctx.fillText(e.char, e.x, e.y);
    ctx.restore();

    if (!e.isCorrect && Math.random() < 0.023 + penaltyMode*0.012) {
      createEnemyBullet(e.x, e.y);
    }

    if (e.y > H + 50) {
      enemies.splice(i,1); // ただ通り過ぎるだけ
    }
  }

  // 自弾
  for (let i=bullets.length-1; i>=0; i--) {
    const b = bullets[i]; b.y -= b.speed;
    ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(b.x,b.y,9,0,Math.PI*2); ctx.fill();
    if (b.y < -30) {bullets.splice(i,1); continue;}

    for (let j=enemies.length-1; j>=0; j--) {
      const e = enemies[j];
      if (Math.hypot(b.x - e.x, b.y - e.y) < e.size * 0.75) {
        if (e.isCorrect) {
          score += 120 + level * 35;
          penaltyMode = 0;
        } else {
          score = Math.max(0, score - 70);
          penaltyMode = 110; // 誤射で約2秒間反撃されやすい
        }
        enemies.splice(j,1); bullets.splice(i,1); break;
      }
    }
  }

  // 敵弾
  for (let i=enemyBullets.length-1; i>=0; i--) {
    const eb = enemyBullets[i]; eb.y += eb.speed;
    ctx.fillStyle = '#c00'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 7.5, 0, Math.PI*2); ctx.fill();
    if (eb.y > H+30) {enemyBullets.splice(i,1); continue;}
    if (Math.hypot(eb.x - (playerX+30), eb.y - (H-55)) < 36) {
      endGame();
    }
  }

  drawPlayer(playerX);

  // スコア表示（◯満点中 ◯点風）
  const maxPossible = Math.floor(1800 + level * 300);
  document.getElementById('scoreDisplay').innerHTML = `スコア <span style="color:#ffff66">${score}</span> / ${maxPossible}`;

  document.getElementById('level').textContent = level;

  if (enemies.length < 6 && Math.random() < 0.22) createEnemy();

  if (penaltyMode > 0) penaltyMode--;

  // レベルアップ
  if (score > level * 1400) {
    level++;
    currentTaskIndex++;
    updateTaskDisplay();
  }
}

function loop() {
  update();
  requestAnimationFrame(loop);
}
loop();

// コントロール
window.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if (e.key === 'ArrowLeft' || e.key === 'a') playerX -= 32;
  if (e.key === 'ArrowRight' || e.key === 'd') playerX += 32;
  if (e.key === ' ' || e.key === 'Enter') shoot();
});

canvas.addEventListener('pointermove', e => {
  if (!gameRunning) return;
  const rect = canvas.getBoundingClientRect();
  playerX = Math.max(20, Math.min(W-70, e.clientX - rect.left - 30));
});

canvas.addEventListener('pointerdown', () => { if(gameRunning) shoot(); });
</script>

<p style="text-align:center;color:#aaa;margin:10px;">v0.5 • 敵通過OK / 60秒固定 / 英語・記号対応 / スコア満点中表示</p>

</body>
</html>
