<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>知らんフォント</title>
<style>
  body { margin:0; background:#111; font-family:sans-serif; color:white; overflow:hidden; }
  canvas { display:block; margin:0 auto; background:#000; touch-action:none; }
  #ui, #startScreen, #clearScreen { position:absolute; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:20; text-align:center; }
  #startScreen, #clearScreen { background:rgba(0,0,0,0.92); pointer-events:all; }
  button { padding:18px 60px; font-size:28px; background:#ff66aa; color:white; border:none; border-radius:50px; cursor:pointer; box-shadow:0 8px 0 #cc4488; margin:10px; }
  .howto { max-width:680px; text-align:left; font-size:17.5px; line-height:1.6; background:rgba(0,0,0,0.7); padding:20px; border-radius:15px; }
  #score, #level { font-size:46px; font-weight:bold; color:#ffff66; text-shadow:0 0 15px #ff0; }
  #level { position:absolute; top:15px; left:50%; transform:translateX(-50%); }
  #info { position:absolute; bottom:12px; right:12px; font-size:13px; background:rgba(0,0,0,0.6); padding:8px 12px; border-radius:8px; max-width:220px; line-height:1.4; }
</style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="startScreen">
  <h1 style="font-size:78px;color:#ff99ee;margin:0;">知らんフォント</h1>
  <p style="font-size:26px;margin:8px 0 20px;">フォントマニア向け判別ゲーム</p>
  <p style="color:#aaa; margin-bottom:20px;">v1.3</p>
  
  <div class="howto">
    <strong>遊び方</strong><br>
    ・左右キー or マウス/指でタコを移動<br>
    ・スペースキー or タップで墨を撃つ<br><br>
    <strong>ルール</strong><br>
    ・上部の<strong>課題フォント</strong>と同じ書体の文字を撃とう！<br>
    ・<span style="color:#ffee44">黄色い文字</span> = 正しいフォント（高得点）<br>
    ・間違ったフォントを撃つと減点＋1発反撃<br>
    ・20秒で高得点を目指せ！
  </div>

  <button onclick="startGame()">▶ ゲームスタート</button>
</div>

<div id="ui" style="display:none; pointer-events:none;">
  <div id="level">レベル 1</div>
  <div id="task" style="position:absolute;top:15px;left:50%;transform:translateX(-50%); font-size:58px; font-weight:bold;"></div>
  <div id="score" style="position:absolute;top:15px;right:20px;">0</div>
  <div id="info"></div>
</div>

<div id="clearScreen" style="display:none;">
  <h1 style="color:#ffee44;">クリア！</h1>
  <p id="clearText" style="font-size:34px;"></p>
  <button onclick="nextLevel()">次のフォントへ →</button>
</div>
