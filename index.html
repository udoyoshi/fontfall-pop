<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>知らんフォント</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700&family=Noto+Sans+JP:wght@900&family=Kosugi+Maru&family=Yuji+Syuku&family=M+PLUS+Rounded+1c:wght@800&family=DotGothic16&family=Reggae+One&family=Hachi+Maru+Pop&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#000; padding:20px 0; display:flex; justify-content:center; box-sizing:border-box; }
  #sf-wrap { 
    position:relative; width:100%; max-width:800px; aspect-ratio:4/3; background:#000; 
    border:4px solid #fff; overflow:hidden; font-family:'DotGothic16',sans-serif; color:#fff;
    user-select:none; -webkit-user-select:none;
  }
  canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>

<div id="sf-wrap">
  <canvas id="sf-canvas" width="800" height="600"></canvas>

  <div id="sf-start" style="position:absolute;inset:0;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000;text-align:center;padding:10px;box-sizing:border-box;">
    <h1 style="color:#0ff;font-size:clamp(28px,6vw,54px);margin:0;text-shadow:2px 2px 0 #f0f;font-family:'Shippori Mincho',serif;">知らんフォント</h1>
    <p style="margin:5px 0 15px;font-size:16px;">v3.3 FONT EDITION</p>
    <div style="border:2px solid #fff;padding:15px;text-align:left;font-size:12px;line-height:1.6;margin-bottom:20px;max-width:90%;">
      目的：上部の課題フォントと同じ書体の文字を撃て<br>
      操作：左右移動、スペースかタップで発射<br>
      ・<span style="color:#ff0;">黄色文字</span>がターゲット<br>
      ・誤射は減点<br>
      ・正解12個で次のフォントへ
    </div>
    <button id="sf-btn-start" style="padding:15px 30px;background:#000;color:#0f0;border:2px solid #0f0;font-size:24px;cursor:pointer;font-family:inherit;">START GAME</button>
  </div>

  <div id="sf-result" style="position:absolute;inset:0;background:rgba(0,0,0,0.92);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:1000;text-align:center;padding:10px;box-sizing:border-box;">
    <h1 id="sf-result-title" style="color:#f0f;font-size:clamp(24px,5vw,40px);margin:0;">TIME UP</h1>
    <div id="sf-rank" style="color:#ff0;font-size:clamp(28px,6vw,48px);margin:10px 0;">-</div>
    <div id="sf-score-text" style="border:2px solid #0ff;padding:10px 20px;font-size:14px;line-height:1.6;margin-bottom:15px;"></div>
    <button id="sf-btn-title" style="padding:10px 20px;background:#000;color:#0f0;border:2px solid #0f0;font-size:16px;cursor:pointer;font-family:inherit;">TITLEに戻る</button>
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', function() {
(function(){
"use strict";

var FONT_DATA = [
  {name:"游明朝",     css:"'Shippori Mincho', serif"},
  {name:"源ノ角ゴシック", css:"'Noto Sans JP', sans-serif"},
  {name:"筑紫明朝",   css:"'Shippori Mincho', serif"},
  {name:"秀英明朝",   css:"'Shippori Mincho', serif"},
  {name:"AXIS Font",    css:"'Noto Sans JP', sans-serif"},
  {name:"小塚明朝",    css:"'Shippori Mincho', serif"},
  {name:"リュウミン",     css:"'Shippori Mincho', serif"},
  {name:"IPA明朝",  css:"'Shippori Mincho', serif"}
];

var CHARS = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわんアイウエオカキクケコABCDEFGHIJKLMNOPQRSTUVWXYZ!?".split("");

var game = {
  running:false, score:0, level:1, time:60, hp:3, cor:0, task:0,
  combo:0, maxC:0, px:370, shots:0, hit:0, tutEnd:0,
  enemies:[], bullets:[], eb:[], particles:[], stars:[],
  cleared:[], feverEnd:0, flash:0, keyL:false, keyR:false,
  banner:null
};
var lastTime = 0;
var audioCtx = null;
var rafId = null;

function ensureAudio(){
  if(!audioCtx){
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return; }
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type){
  if(!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  var now = audioCtx.currentTime;
  var f0=440, f1=440, vol=0.1, dur=0.1, w='square';
  if(type==='shoot'){ f0=880; f1=440; vol=0.1; dur=0.1; }
  else if(type==='hit'){ f0=1200; f1=2000; vol=0.15; dur=0.12; }
  else if(type==='miss'){ f0=200; f1=80; vol=0.18; dur=0.25; w='sawtooth'; }
  osc.type = w;
  osc.frequency.setValueAtTime(f0, now);
  osc.frequency.exponentialRampToValueAtTime(f1, now+dur);
  gain.gain.setValueAtTime(vol, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now+dur+0.05);
  osc.start(now);
  osc.stop(now+dur+0.1);
}

function isCleared(idx){
  for(var i=0;i<game.cleared.length;i++){ if(game.cleared[i]===idx) return true; }
  return false;
}

function spawnEnemy(){
  var isCorrect = Math.random() < 0.45;
  var fontIdx = game.task;
  if(!isCorrect){
    do { fontIdx = Math.floor(Math.random()*8); } while(fontIdx === game.task);
  }
  game.enemies.push({
    x: Math.random()*620+60, y: -60,
    char: CHARS[Math.floor(Math.random()*CHARS.length)],
    fontIdx: fontIdx, font: FONT_DATA[fontIdx].css,
    size: 44 + Math.random()*18,
    speed: 1.8 + game.level*0.15,
    isCorrect: isCorrect,
    offset: Math.random()*Math.PI*2,
    waveAmp: Math.random()*4 + 1
  });
}

function shoot(){
  if(!game.running) return;
  game.shots++;
  game.bullets.push({ x: game.px+30, y: 520, speed: 720 });
  playSound("shoot");
}

function startGame(){
  ensureAudio();
  document.getElementById('sf-start').style.display = 'none';
  game.running = true;
  game.score = 0; game.level = 1; game.time = 60; game.cor = 0;
  game.task = Math.floor(Math.random()*8);
  game.px = 370;
  game.enemies = []; game.bullets = [];
  lastTime = performance.now();
  if(rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(loop);
}

function endGame(){
  game.running = false;
  document.getElementById('sf-result-title').textContent = "TIME UP";
  document.getElementById('sf-rank').textContent = game.score;
  document.getElementById('sf-score-text').innerHTML = "SCORE " + game.score;
  document.getElementById('sf-result').style.display = 'flex';
}

function loop(now){
  if(!game.running) return;
  var dt = Math.min((now - lastTime)/1000, 0.05);
  lastTime = now;
  var ctx = document.getElementById('sf-canvas').getContext('2d');

  ctx.fillStyle = '#0a0a18';
  ctx.fillRect(0, 0, 800, 600);

  // 敵
  for(var i=game.enemies.length-1;i>=0;i--){
    var e = game.enemies[i];
    e.y += e.speed * dt * 60;
    e.x += Math.sin(e.y*0.04 + e.offset) * e.waveAmp;
    ctx.save();
    ctx.font = "bold " + e.size + "px " + e.font;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = e.isCorrect ? '#ff0' : '#aac';
    ctx.shadowBlur = e.isCorrect ? 18 : 0;
    ctx.shadowColor = '#ff0';
    ctx.fillText(e.char, e.x, e.y);
    ctx.restore();
    if(e.y > 680) game.enemies.splice(i, 1);
  }

  // 自弾
  for(var i=game.bullets.length-1;i>=0;i--){
    var b = game.bullets[i];
    b.y -= b.speed * dt * 60;
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x-3, b.y-12, 6, 24);
    if(b.y < -30){ game.bullets.splice(i, 1); continue; }

    for(var j=game.enemies.length-1;j>=0;j--){
      var e = game.enemies[j];
      if(Math.hypot(b.x - e.x, b.y - e.y) < 30){
        if(e.isCorrect){
          game.score += 150;
          game.cor++;
          if(game.cor >= 12){
            game.cor = 0;
            game.level++;
          }
        } else {
          game.score = Math.max(0, game.score - 85);
        }
        game.enemies.splice(j,1);
        game.bullets.splice(i,1);
        break;
      }
    }
  }

  // 自機
  ctx.save();
  ctx.translate(game.px + 30, 540);
  ctx.fillStyle = '#ff66aa';
  ctx.beginPath(); ctx.ellipse(0,0,28,22,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-10,-8,7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10,-8,7,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 課題表示
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillRect(240, 20, 320, 80);
  ctx.fillStyle = '#222';
  ctx.font = "bold 42px " + FONT_DATA[game.task].css;
  ctx.textAlign = 'center';
  ctx.fillText(FONT_DATA[game.task].name, 400, 72);
  ctx.restore();

  document.getElementById('score').textContent = game.score;
  document.getElementById('level').textContent = "LEVEL " + game.level;

  if(game.time <= 0){
    endGame();
  }

  if(game.enemies.length < 6 && Math.random() < 0.03){
    // spawnEnemy();
  }

  rafId = requestAnimationFrame(loop);
}

document.getElementById('sf-btn-start').addEventListener('click', startGame);

})();
});
</script>
</body>
</html>
