<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>書体撃ち - Fontfall Pop（v0.7 しらんわ！）</title>
<style>
  body { margin:0; background:#111; font-family:sans-serif; color:white; overflow:hidden; }
  canvas { display:block; margin:0 auto; background:#000; touch-action:none; }
  #ui, #startScreen, #gameOverScreen { position:absolute; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:20; text-align:center; }
  #startScreen, #gameOverScreen { background:rgba(0,0,0,0.92); pointer-events:all; }
  button { padding:18px 60px; font-size:28px; background:#ff66aa; color:white; border:none; border-radius:50px; cursor:pointer; box-shadow:0 8px 0 #cc4488; }
  button:active { transform:translateY(4px); box-shadow:0 4px 0 #cc4488; }
  #task { font-size:56px; font-weight:bold; text-shadow:0 0 25px #ff0; letter-spacing:2px; }
  #timer { font-size:46px; color:#ffff66; font-weight:bold; }
</style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="startScreen">
  <h1 style="font-size:68px;color:#ff99ee;">書体撃ち</h1>
  <p style="font-size:26px;margin:10px;">しらんわ！フォント判別60秒</p>
  <button onclick="startGame()">▶ スタート</button>
</div>

<div id="ui" style="display:none; pointer-events:none;">
  <div style="position:absolute;top:15px;left:15px;">レベル <span id="level">1</span></div>
  <div id="task" style="position:absolute;top:15px;left:50%;transform:translateX(-50%);"></div>
  <div style="position:absolute;top:15px;right:15px;">スコア <span id="score">0</span></div>
  <div id="timer" style="position:absolute;bottom:15px;left:50%;transform:translateX(-50%);">60</div>
</div>

<div id="gameOverScreen" style="display:none;">
  <h1 style="color:#ff6666;">タイムアップ！</h1>
  <p id="finalScore" style="font-size:38px;"></p>
  <button onclick="restartGame()">もう一度遊ぶ</button>
</div>

<script>
// =============== 書体撃ち v0.7 「しらんわ！」仕様 ===============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

let score = 0, level = 1, timeLeft = 60;
let playerX = W/2 - 30;
let bullets = [], enemies = [], enemyBullets = [], particles = [];
let gameRunning = false;
let currentTaskIndex = 0;
let penaltyMode = 0;

const fonts = [
  "'Noto Serif JP', serif",           // 游明朝
  "'Noto Sans JP', sans-serif",       // 源ノ角ゴシック
  "'Kosugi Maru', sans-serif",
  "'Yuji Syuku', cursive",
  "'M PLUS Rounded 1c', sans-serif",
  "serif"
];

const taskNames = ["游明朝","源ノ角ゴシック","筑紫明朝","秀英明朝","AXIS Font","小塚明朝","リュウミン","IPA明朝"];

const chars = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわんアイウエオカキクケコABCDEFGHIJKLMNOPQRSTUVWXYZ!?".split("");

function getTaskName() { return taskNames[currentTaskIndex % taskNames.length]; }

function updateTaskDisplay() {
  const el = document.getElementById('task');
  el.style.fontFamily = fonts[currentTaskIndex % fonts.length];
  el.textContent = getTaskName();
}

function drawPlayer(x) {
  ctx.save(); ctx.translate(x+30, H-60);
  ctx.fillStyle = '#ff66aa';
  ctx.beginPath(); ctx.ellipse(0,0,28,22,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-10,-8,7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10,-8,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-10,-8,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10,-8,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function createEnemy() {
  const char = chars[Math.floor(Math.random()*chars.length)];
  const fontIndex = Math.floor(Math.random()*fonts.length);
  const isCorrect = fontIndex === (currentTaskIndex % fonts.length);
  
  enemies.push({
    x: Math.random()*(W-100)+50,
    y: -60,
    char: char,
    font: fonts[fontIndex],
    size: 36 + Math.random()*26,
    speed: 1.35 + level*0.16,
    isCorrect: isCorrect,
    offset: Math.random()*Math.PI*2,
    waveType: Math.random() < 0.35 ? 1 : 0, // 1 = 楕円軌道風
    vx: (Math.random()-0.5)*1.8
  });
}

function shoot() {
  bullets.push({x: playerX+30, y:H-85, speed:14.5});
}

function createEnemyBullet(ex, ey) {
  enemyBullets.push({x:ex, y:ey, speed:5.2});
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  resetGameState();
  gameRunning = true;
}

function resetGameState() {
  score = 0; level = 1; timeLeft = 60; currentTaskIndex = 0;
  bullets = []; enemies = []; enemyBullets = []; particles = [];
  playerX = W/2 - 30; penaltyMode = 0;
  updateTaskDisplay();
}

function endGame() {
  gameRunning = false;
  document.getElementById('finalScore').innerHTML = `最終スコア: ${score}<br>レベル: ${level}`;
  document.getElementById('gameOverScreen').style.display = 'flex';
}

function restartGame() {
  document.getElementById('gameOverScreen').style.display = 'none';
  startGame();
}

function update() {
  if (!gameRunning) return;

  // POP和風背景
  ctx.fillStyle = '#fff0e0'; ctx.fillRect(0,0,W,H);
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#ff99ee'); g.addColorStop(1,'#88ddff');
  ctx.globalAlpha = 0.35; ctx.fillStyle = g; ctx.fillRect(0,0,W,H); ctx.globalAlpha = 1;

  if (Math.random() < 0.017) timeLeft--;
  document.getElementById('timer').textContent = timeLeft;
  if (timeLeft <= 0) endGame();

  // 敵（ファミコン風メビウス動き）
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;
    
    // 左右揺れ + 楕円軌道
    if (e.waveType === 0) {
      e.x += Math.sin(e.y * 0.085 + e.offset) * 2.8;
    } else {
      e.x += Math.sin(e.y * 0.055 + e.offset) * 4.2 + e.vx;
    }

    ctx.save();
    ctx.font = `${e.size}px ${e.font}`;
    ctx.fillStyle = e.isCorrect ? '#ffee44' : '#ff88cc';
    ctx.shadowBlur = 24; ctx.shadowColor = e.isCorrect ? '#ff0' : '#f0f';
    ctx.fillText(e.char, Math.max(20, Math.min(W-40, e.x)), e.y);
    ctx.restore();

    // 誤フォントの攻撃（大幅に減らした）
    if (!e.isCorrect && Math.random() < 0.0075 + penaltyMode*0.007) {
      createEnemyBullet(e.x, e.y);
    }

    if (e.y > H + 70) enemies.splice(i,1);
  }

  // 自弾
  for (let i=bullets.length-1; i>=0; i--) {
    const b = bullets[i]; b.y -= b.speed;
    ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(b.x,b.y,9,0,Math.PI*2); ctx.fill();
    if (b.y < -30) {bullets.splice(i,1); continue;}

    for (let j=enemies.length-1; j>=0; j--) {
      const e = enemies[j];
      if (Math.hypot(b.x - e.x, b.y - e.y) < e.size * 0.78) {
        if (e.isCorrect) {
          score += 150 + level*45;
          penaltyMode = 0;
        } else {
          score = Math.max(0, score - 85);
          penaltyMode = 75; // 誤射ペナルティ
        }
        enemies.splice(j,1); bullets.splice(i,1); break;
      }
    }
  }

  // 敵弾
  for (let i=enemyBullets.length-1; i>=0; i--) {
    const eb = enemyBullets[i]; eb.y += eb.speed;
    ctx.fillStyle = '#c00'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 7, 0, Math.PI*2); ctx.fill();
    if (eb.y > H+30) {enemyBullets.splice(i,1); continue;}
    if (Math.hypot(eb.x-(playerX+30), eb.y-(H-55)) < 36) endGame();
  }

  drawPlayer(playerX);

  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;

  if (enemies.length < 8 && Math.random() < 0.23) createEnemy();

  if (penaltyMode > 0) penaltyMode--;

  if (score > level * 1700) {
    level++;
    currentTaskIndex++;
    updateTaskDisplay();
  }
}

function loop() { update(); requestAnimationFrame(loop); }
loop();

// コントロール
window.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if (e.key === 'ArrowLeft' || e.key === 'a') playerX -= 34;
  if (e.key === 'ArrowRight' || e.key === 'd') playerX += 34;
  if (e.key === ' ' || e.key === 'Enter') shoot();
});

canvas.addEventListener('pointermove', e => {
  if (!gameRunning) return;
  const rect = canvas.getBoundingClientRect();
  playerX = Math.max(20, Math.min(W-70, e.clientX - rect.left - 30));
});

canvas.addEventListener('pointerdown', () => { if(gameRunning) shoot(); });
</script>

<p style="text-align:center;color:#aaa;margin:10px;">v0.7 • しらんわ！仕様 / 攻撃1/3に減少 / メビウス風動き</p>

</body>
</html>
