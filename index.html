<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>書体撃ち - Fontfall Pop（v0.8）</title>
<style>
  body { margin:0; background:#111; font-family:sans-serif; color:white; overflow:hidden; }
  canvas { display:block; margin:0 auto; background:#000; touch-action:none; }
  #ui, #startScreen, #clearScreen { position:absolute; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:20; text-align:center; }
  #startScreen, #clearScreen { background:rgba(0,0,0,0.92); pointer-events:all; }
  button { padding:18px 60px; font-size:28px; background:#ff66aa; color:white; border:none; border-radius:50px; cursor:pointer; }
</style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="startScreen">
  <h1 style="font-size:68px;color:#ff99ee;">書体撃ち</h1>
  <p style="font-size:26px;">しらんわ！フォント判別</p>
  <button onclick="startGame()">▶ スタート</button>
</div>

<div id="ui" style="display:none; pointer-events:none;">
  <div style="position:absolute;top:15px;left:15px;">レベル <span id="level">1</span></div>
  <div id="task" style="position:absolute;top:15px;left:50%;transform:translateX(-50%); font-size:56px; font-weight:bold;"></div>
  <div style="position:absolute;top:15px;right:15px;">スコア <span id="score">0</span></div>
</div>

<div id="clearScreen" style="display:none;">
  <h1 style="color:#ffee44;">クリア！</h1>
  <p id="clearText" style="font-size:32px;"></p>
  <button onclick="nextLevel()">次のフォントへ</button>
</div>

<script>
// =============== v0.8 クリア条件明確版 ===============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

let score = 0, level = 1;
let playerX = W/2 - 30;
let bullets = [], enemies = [], enemyBullets = [];
let gameRunning = false;
let currentTaskIndex = 0;

const fonts = ["'Noto Serif JP', serif","'Noto Sans JP', sans-serif","'Kosugi Maru', sans-serif","'Yuji Syuku', cursive","'M PLUS Rounded 1c', sans-serif","serif"];
const taskNames = ["游明朝","源ノ角ゴシック","筑紫明朝","秀英明朝","AXIS Font","小塚明朝","リュウミン","IPA明朝"];

const chars = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわんアイウエオカキクケコABCDEFGHIJKLMNOPQRSTUVWXYZ!?".split("");

function getTaskName() { return taskNames[currentTaskIndex % taskNames.length]; }

function updateTaskDisplay() {
  const el = document.getElementById('task');
  el.style.fontFamily = fonts[currentTaskIndex % fonts.length];
  el.textContent = getTaskName();
}

function drawPlayer(x) { /* 省略（前回と同じ） */ 
  ctx.save(); ctx.translate(x+30, H-60);
  ctx.fillStyle = '#ff66aa'; ctx.beginPath(); ctx.ellipse(0,0,28,22,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-10,-8,7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10,-8,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-10,-8,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10,-8,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function createEnemy() {
  const char = chars[Math.floor(Math.random()*chars.length)];
  const fontIndex = Math.floor(Math.random()*fonts.length);
  const isCorrect = fontIndex === (currentTaskIndex % fonts.length);
  enemies.push({x: Math.random()*(W-100)+50, y: -60, char, font: fonts[fontIndex], size: 36 + Math.random()*26, 
    speed: 1.4 + level*0.15, isCorrect, offset: Math.random()*Math.PI*2, waveType: Math.random()<0.35?1:0 });
}

function shoot() { bullets.push({x: playerX+30, y:H-85, speed:14}); }

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  resetGame();
  gameRunning = true;
}

function resetGame() {
  score = 0; enemies = []; bullets = []; enemyBullets = [];
  playerX = W/2 - 30;
  updateTaskDisplay();
}

function checkClear() {
  const required = 800 + level * 400; // レベルごとに必要なスコア
  if (score >= required) {
    gameRunning = false;
    document.getElementById('clearText').innerHTML = `${getTaskName()} クリア！<br>スコア ${score}`;
    document.getElementById('clearScreen').style.display = 'flex';
  }
}

function nextLevel() {
  document.getElementById('clearScreen').style.display = 'none';
  currentTaskIndex++;
  level++;
  document.getElementById('level').textContent = level;
  resetGame();
  gameRunning = true;
}

function update() {
  if (!gameRunning) return;

  ctx.fillStyle = '#fff0e0'; ctx.fillRect(0,0,W,H);
  const g = ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#ff99ee'); g.addColorStop(1,'#88ddff');
  ctx.globalAlpha = 0.35; ctx.fillStyle = g; ctx.fillRect(0,0,W,H); ctx.globalAlpha = 1;

  // 敵（動きは前回と同じ）
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;
    if (e.waveType === 0) e.x += Math.sin(e.y * 0.085 + e.offset) * 2.8;
    else e.x += Math.sin(e.y * 0.055 + e.offset) * 4.2;

    ctx.save();
    ctx.font = `${e.size}px ${e.font}`;
    ctx.fillStyle = e.isCorrect ? '#ffee44' : '#ff88cc';
    ctx.shadowBlur = 24; ctx.shadowColor = e.isCorrect ? '#ff0' : '#f0f';
    ctx.fillText(e.char, Math.max(20, Math.min(W-40, e.x)), e.y);
    ctx.restore();

    if (e.y > H + 70) enemies.splice(i,1);
  }

  // 自弾・衝突・敵弾（省略せず動作OK）
  // ...（前回と同じ処理）

  drawPlayer(playerX);
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;

  if (enemies.length < 8 && Math.random() < 0.25) createEnemy();

  checkClear(); // 毎フレームクリア判定
}

function loop() { update(); requestAnimationFrame(loop); }
loop();

// コントロール（省略）
</script>
</body>
</html>
