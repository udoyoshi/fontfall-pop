<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>知らんフォント</title>
<style>
  body { margin:0; background:#111; font-family:sans-serif; color:white; overflow:hidden; }
  canvas { display:block; margin:20px auto; background:#000; touch-action:none; box-shadow:0 10px 30px rgba(0,0,0,0.6); border-radius:8px; }
  
  #startScreen, #clearScreen { 
    position:absolute; top:0; left:0; right:0; bottom:0; 
    display:flex; flex-direction:column; justify-content:center; align-items:center; 
    z-index:100; text-align:center; background:rgba(0,0,0,0.95);
  }
  button { 
    padding:18px 70px; font-size:29px; background:#ff77aa; color:white; 
    border:none; border-radius:50px; cursor:pointer; box-shadow:0 8px 0 #cc5588; 
    margin-top:25px; font-weight:bold; 
  }
  button:active { transform:translateY(5px); box-shadow:0 3px 0 #cc5588; }

  #muteBtn { 
    position:absolute; top:15px; right:15px; z-index:200; 
    background:rgba(255,255,255,0.25); color:white; border:none; 
    border-radius:50%; width:50px; height:50px; font-size:24px; cursor:pointer;
  }
</style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="startScreen">
  <h1 style="font-size:74px;color:#ff99cc;margin:0">知らんフォント</h1>
  <p style="font-size:26px;margin:5px 0 25px;color:#ffeecc">v3.0</p>
  <div style="max-width:680px;text-align:left;font-size:16.5px;line-height:1.7;background:rgba(0,0,0,0.75);padding:25px;border-radius:15px;margin:20px;color:#fff">
    <strong>遊び方</strong><br>
    ・左右キー or マウス/指でタコを移動<br>
    ・スペース or タップで墨を撃つ<br><br>
    <strong>ルール</strong><br>
    上部の<strong>課題フォント</strong>と同じ書体の文字（<span style="color:#ffee44">黄色</span>）を撃とう！<br>
    正解を12個撃つと次のフォントへ
  </div>
  <button onclick="startGame()">▶ ゲームスタート</button>
</div>

<div id="ui" style="display:none;position:absolute;top:0;left:0;right:0;z-index:50;pointer-events:none">
  <div id="level" style="position:absolute;top:16px;right:180px;font-size:36px;font-weight:bold;color:#ffff88">レベル 1</div>
  <div id="score" style="position:absolute;top:13px;right:25px;font-size:45px;font-weight:bold;color:#ffff88">0</div>
  <div id="task" style="position:absolute;top:68px;left:50%;transform:translateX(-50%);font-size:54px;font-weight:bold;text-shadow:0 0 15px #ff0"></div>
  <div id="missInfo" style="position:absolute;top:135px;left:50%;transform:translateX(-50%);font-size:29px;color:#ff8888;font-weight:bold;opacity:0;transition:opacity 0.7s"></div>
</div>

<div id="clearScreen" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;text-align:center;background:rgba(0,0,0,0.96)">
  <h1 style="color:#ffee44">タイムアップ！</h1>
  <p id="clearText" style="font-size:33px;margin:20px 0;line-height:1.4"></p>
  <button onclick="restartGame()">もう一度プレイ</button>
</div>

<button id="muteBtn">🔊</button>

<script>
// 知らんフォント v3.0 - GitHub Pages完全版
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

let score = 0, level = 1, timeLeft = 60, correctCount = 0, playerX = W/2 - 30;
let bullets = [], enemies = [], gameRunning = false, currentTaskIndex = 0;
let lastTime = Date.now(), highScore = localStorage.getItem('fontfallHigh') || 0;
let isMuted = false;

const fonts = ["'Noto Serif JP', serif","'Noto Sans JP', sans-serif","'Kosugi Maru', sans-serif","'Yuji Syuku', cursive","'M PLUS Rounded 1c', sans-serif","'Shippori Mincho', serif"];
const taskNames = ["游明朝","源ノ角ゴシック","筑紫明朝","秀英明朝","AXIS Font","小塚明朝","リュウミン","IPA明朝"];
const chars = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわんアイウエオカキクケコABCDEFGHIJKLMNOPQRSTUVWXYZ!?".split("");

let audioCtx = null;

function initAudio() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function playSound(type) {
  if (isMuted || !audioCtx) return;
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  if (type === "shoot") { osc.type = 'sawtooth'; osc.frequency.value = 850; gain.gain.value = 0.2; }
  else if (type === "hit") { osc.type = 'sine'; osc.frequency.value = 1650; gain.gain.value = 0.5; }
  else if (type === "miss") { osc.type = 'sawtooth'; osc.frequency.value = 320; gain.gain.value = 0.3; }
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

function updateTaskDisplay() {
  const el = document.getElementById('task');
  el.style.fontFamily = fonts[currentTaskIndex % fonts.length];
  el.textContent = taskNames[currentTaskIndex % taskNames.length];
}

function drawPlayer() {
  ctx.save();
  ctx.translate(playerX + 30, H - 60);
  ctx.fillStyle = '#ff77aa';
  ctx.beginPath(); ctx.ellipse(0, 0, 28, 22, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; 
  ctx.beginPath(); ctx.arc(-10, -8, 7, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10, -8, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-10, -8, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10, -8, 4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#ff4488'; ctx.lineWidth = 6;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(i*8, 15);
    ctx.quadraticCurveTo(i*12, 35, i*5 + Math.sin(Date.now()/180)*3, 48);
    ctx.stroke();
  }
  ctx.restore();
}

function createEnemy() {
  const char = chars[Math.floor(Math.random()*chars.length)];
  const fi = Math.floor(Math.random()*fonts.length);
  const isCorrect = fi === (currentTaskIndex % fonts.length);
  enemies.push({
    x: Math.random()*(W-100)+50, y: -60, char,
    font: fonts[fi], size: 36 + Math.random()*26,
    speed: 1.4 + level*0.13, isCorrect,
    offset: Math.random()*Math.PI*2, waveType: Math.random()<0.4?1:0
  });
}

function shoot() {
  bullets.push({x: playerX+30, y: H-85, speed: 14});
  playSound("shoot");
}

function startGame() {
  if (!audioCtx) initAudio();
  if (audioCtx.state === "suspended") audioCtx.resume();
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  resetGame();
  gameRunning = true;
  lastTime = Date.now();
}

function resetGame() {
  score = 0; correctCount = 0; timeLeft = 60; level = 1;
  enemies = []; bullets = [];
  playerX = W/2 - 30;
  currentTaskIndex = 0;
  updateTaskDisplay();
}

function checkLevelUp() {
  if (correctCount >= 12) {
    currentTaskIndex = (currentTaskIndex + 1) % taskNames.length;
    correctCount = 0;
    level = Math.floor(currentTaskIndex / 3) + 1;
    updateTaskDisplay();
  }
}

function update() {
  if (!gameRunning) return;
  const now = Date.now();
  if (now - lastTime >= 1000) { timeLeft = Math.max(0, timeLeft - 1); lastTime = now; }

  ctx.fillStyle = '#fff8f0'; ctx.fillRect(0,0,W,H);
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#ffeef5'); g.addColorStop(1,'#e0f0ff');
  ctx.globalAlpha = 0.4; ctx.fillStyle = g; ctx.fillRect(0,0,W,H); ctx.globalAlpha = 1;

  for (let i = enemies.length-1; i >= 0; i--) {
    const en = enemies[i];
    en.y += en.speed;
    if (en.waveType === 0) en.x += Math.sin(en.y*0.085 + en.offset)*2.8;
    else en.x += Math.sin(en.y*0.055 + en.offset)*4.2;

    ctx.save();
    ctx.font = `${en.size}px ${en.font}`;
    ctx.fillStyle = en.isCorrect ? '#ffee44' : '#ff99bb';
    ctx.shadowBlur = en.isCorrect ? 25 : 8;
    ctx.shadowColor = en.isCorrect ? '#ffff88' : '#ff99bb';
    ctx.fillText(en.char, Math.max(20, Math.min(W-40, en.x)), en.y);
    ctx.restore();
    if (en.y > H + 70) enemies.splice(i,1);
  }

  for (let i=bullets.length-1; i>=0; i--) {
    const b = bullets[i]; b.y -= b.speed;
    ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(b.x, b.y, 9, 0, Math.PI*2); ctx.fill();
    if (b.y < -30) {bullets.splice(i,1); continue;}

    for (let j=enemies.length-1; j>=0; j--) {
      const en = enemies[j];
      if (Math.hypot(b.x - en.x, b.y - en.y) < en.size*0.78) {
        if (en.isCorrect) {
          score += 150 + level*45;
          correctCount++;
          playSound("hit");
          checkLevelUp();
        } else {
          score = Math.max(0, score - 85);
          playSound("miss");
          const missEl = document.getElementById('missInfo');
          missEl.textContent = `× ${taskNames[fonts.indexOf(en.font)] || '誤フォント'}`;
          missEl.style.opacity = 1;
          setTimeout(() => missEl.style.opacity = 0, 1400);
        }
        enemies.splice(j,1); bullets.splice(i,1); break;
      }
    }
  }

  drawPlayer();
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = `レベル ${level}`;

  if (timeLeft <= 0) {
    gameRunning = false;
    if (score > highScore) { highScore = score; localStorage.setItem('fontfallHigh', highScore); }
    document.getElementById('clearText').innerHTML = `最終スコア <strong>${score}</strong><br>ハイスコア <strong>${highScore}</strong>`;
    document.getElementById('clearScreen').style.display = 'flex';
  }

  if (enemies.length < 8 && Math.random() < 0.28) createEnemy();
}

function loop() { update(); requestAnimationFrame(loop); }
function restartGame() {
  document.getElementById('clearScreen').style.display = 'none';
  document.getElementById('ui').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
}

// コントロール
document.getElementById('muteBtn').onclick = () => {
  isMuted = !isMuted;
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
};

window.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if (e.key === 'ArrowLeft' || e.key === 'a') playerX -= 35;
  if (e.key === 'ArrowRight' || e.key === 'd') playerX += 35;
  if (e.key === ' ' || e.key === 'Enter') shoot();
});

canvas.addEventListener('pointermove', e => {
  if (!gameRunning) return;
  const rect = canvas.getBoundingClientRect();
  playerX = Math.max(20, Math.min(W-70, e.clientX - rect.left - 30));
});

canvas.addEventListener('pointerdown', () => { if(gameRunning) shoot(); });

loop();
</script>
</body>
</html>
