<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>知らんフォント</title>
<style>
  body { margin:0; background:#111; font-family:sans-serif; color:white; overflow:hidden; }
  canvas { display:block; margin:0 auto; background:#000; touch-action:none; }
  #ui, #startScreen, #clearScreen { position:absolute; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:20; text-align:center; }
  #startScreen, #clearScreen { background:rgba(0,0,0,0.92); pointer-events:all; }
  button { padding:18px 60px; font-size:28px; background:#ff66aa; color:white; border:none; border-radius:50px; cursor:pointer; box-shadow:0 8px 0 #cc4488; margin:10px; }
  .howto { max-width:620px; text-align:left; font-size:18px; line-height:1.6; background:rgba(0,0,0,0.6); padding:20px; border-radius:15px; }
  #score { font-size:52px !important; font-weight:bold; color:#ffff66; text-shadow:0 0 15px #ff0; }
</style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="startScreen">
  <h1 style="font-size:78px;color:#ff99ee;margin:0;">知らんフォント</h1>
  <p style="font-size:28px;margin:10px 0 20px;">フォントマニア向け判別ゲーム</p>
  
  <div class="howto">
    <strong>遊び方</strong><br>
    ・左右キー or マウス/指でタコを移動<br>
    ・スペースキー or タップで墨を撃つ<br><br>
    <strong>ルール</strong><br>
    ・上部の<strong>課題フォント</strong>と同じ書体の文字だけを撃とう！<br>
    ・<span style="color:#ffee44">黄色い文字</span> = 正しいフォント（高得点）<br>
    ・間違ったフォントを撃つと減点＋1発反撃<br>
    ・スコアを稼いでクリア → 次のフォントへ！
  </div>

  <button onclick="startGame()">▶ ゲームスタート</button>
</div>

<div id="ui" style="display:none; pointer-events:none;">
  <div style="position:absolute;top:15px;left:15px;">レベル <span id="level">1</span></div>
  <div id="task" style="position:absolute;top:15px;left:50%;transform:translateX(-50%); font-size:58px; font-weight:bold;"></div>
  <div style="position:absolute;top:15px;right:15px;">スコア <span id="score">0</span></div>
</div>

<div id="clearScreen" style="display:none;">
  <h1 style="color:#ffee44;">クリア！</h1>
  <p id="clearText" style="font-size:34px;"></p>
  <button onclick="nextLevel()">次のフォントへ →</button>
</div>

<script>
// =============== 知らんフォント v1.1 ===============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

let score = 0, level = 1;
let playerX = W/2 - 30;
let bullets = [], enemies = [], enemyBullets = [];
let gameRunning = false;
let currentTaskIndex = 0;

const fonts = ["'Noto Serif JP', serif","'Noto Sans JP', sans-serif","'Kosugi Maru', sans-serif","'Yuji Syuku', cursive","'M PLUS Rounded 1c', sans-serif","serif"];
const taskNames = ["游明朝","源ノ角ゴシック","筑紫明朝","秀英明朝","AXIS Font","小塚明朝","リュウミン","IPA明朝"];
const chars = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわんアイウエオカキクケコABCDEFGHIJKLMNOPQRSTUVWXYZ!?".split("");

function getTaskName() { return taskNames[currentTaskIndex % taskNames.length]; }

function updateTaskDisplay() {
  const el = document.getElementById('task');
  el.style.fontFamily = fonts[currentTaskIndex % fonts.length];
  el.textContent = getTaskName();
}

// 効果音（Web Audio API）
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);

  if (type === "shoot") {
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    gain.gain.value = 0.3; gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  } else if (type === "hit") {
    osc.type = 'sine'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
    gain.gain.value = 0.6; gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
  } else if (type === "miss") {
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
    gain.gain.value = 0.4; gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  }
  osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

function drawPlayer(x) {
  ctx.save();
  ctx.translate(x + 30, H - 60);
  ctx.fillStyle = '#ff66aa';
  ctx.beginPath(); ctx.ellipse(0, 0, 28, 22, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-10, -8, 7, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10, -8, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-10, -8, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10, -8, 4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#ff4488'; ctx.lineWidth = 6;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(i*8, 15);
    ctx.quadraticCurveTo(i*12, 35, i*5 + Math.sin(Date.now()/180)*3, 48);
    ctx.stroke();
  }
  ctx.restore();
}

function createEnemy() {
  const char = chars[Math.floor(Math.random()*chars.length)];
  const fontIndex = Math.floor(Math.random()*fonts.length);
  const isCorrect = fontIndex === (currentTaskIndex % fonts.length);
  enemies.push({
    x: Math.random()*(W-100)+50, y: -60, char: char,
    font: fonts[fontIndex], size: 36 + Math.random()*26,
    speed: 1.4 + level*0.15, isCorrect: isCorrect,
    offset: Math.random()*Math.PI*2, waveType: Math.random()<0.35?1:0,
    attacked: false
  });
}

function shoot() {
  bullets.push({x: playerX+30, y: H-85, speed: 14});
  playSound("shoot");
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('ui').style.display = 'block';
  resetGame();
  gameRunning = true;
}

function resetGame() {
  score = 0; enemies = []; bullets = []; enemyBullets = [];
  playerX = W/2 - 30;
  updateTaskDisplay();
}

function checkClear() {
  if (score >= 800 + level * 400) {
    gameRunning = false;
    document.getElementById('clearText').innerHTML = `${getTaskName()} クリア！<br>スコア ${score}`;
    document.getElementById('clearScreen').style.display = 'flex';
  }
}

function nextLevel() {
  document.getElementById('clearScreen').style.display = 'none';
  currentTaskIndex++;
  level++;
  document.getElementById('level').textContent = level;
  resetGame();
  gameRunning = true;
}

function update() {
  if (!gameRunning) return;

  ctx.fillStyle = '#fff0e0'; ctx.fillRect(0,0,W,H);
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#ff99ee'); g.addColorStop(1,'#88ddff');
  ctx.globalAlpha = 0.35; ctx.fillStyle = g; ctx.fillRect(0,0,W,H); ctx.globalAlpha = 1;

  // 敵
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;
    if (e.waveType === 0) e.x += Math.sin(e.y * 0.085 + e.offset) * 2.8;
    else e.x += Math.sin(e.y * 0.055 + e.offset) * 4.2;

    ctx.save();
    ctx.font = `${e.size}px ${e.font}`;
    ctx.fillStyle = e.isCorrect ? '#ffee44' : '#ff88cc';
    ctx.shadowBlur = 24; ctx.shadowColor = e.isCorrect ? '#ff0' : '#f0f';
    ctx.fillText(e.char, Math.max(20, Math.min(W-40, e.x)), e.y);
    ctx.restore();

    if (e.y > H + 70) enemies.splice(i,1);
  }

  // 自弾
  for (let i=bullets.length-1; i>=0; i--) {
    const b = bullets[i]; b.y -= b.speed;
    ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(b.x, b.y, 9, 0, Math.PI*2); ctx.fill();
    if (b.y < -30) {bullets.splice(i,1); continue;}

    for (let j=enemies.length-1; j>=0; j--) {
      const e = enemies[j];
      if (Math.hypot(b.x - e.x, b.y - e.y) < e.size*0.78) {
        if (e.isCorrect) {
          score += 150 + level*45;
          playSound("hit");
        } else {
          score = Math.max(0, score - 85);
          playSound("miss");
          if (!e.attacked) {
            enemyBullets.push({x: e.x, y: e.y, speed: 6});
            e.attacked = true;
          }
        }
        enemies.splice(j,1); bullets.splice(i,1); break;
      }
    }
  }

  // 敵弾
  for (let i=enemyBullets.length-1; i>=0; i--) {
    const eb = enemyBullets[i]; eb.y += eb.speed;
    ctx.fillStyle = '#c00'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 7, 0, Math.PI*2); ctx.fill();
    if (eb.y > H+30) {enemyBullets.splice(i,1); continue;}
    if (Math.hypot(eb.x-(playerX+30), eb.y-(H-55)) < 36) {
      alert("ゲームオーバー！ 最終スコア: " + score);
      location.reload();
    }
  }

  drawPlayer(playerX);
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;

  if (enemies.length < 8 && Math.random() < 0.25) createEnemy();
  checkClear();
}

function loop() { update(); requestAnimationFrame(loop); }
loop();

// コントロール
window.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if (e.key === 'ArrowLeft' || e.key === 'a') playerX -= 35;
  if (e.key === 'ArrowRight' || e.key === 'd') playerX += 35;
  if (e.key === ' ' || e.key === 'Enter') shoot();
});

canvas.addEventListener('pointermove', e => {
  if (!gameRunning) return;
  const rect = canvas.getBoundingClientRect();
  playerX = Math.max(20, Math.min(W-70, e.clientX - rect.left - 30));
});

canvas.addEventListener('pointerdown', () => { if(gameRunning) shoot(); });
</script>

</body>
</html>
