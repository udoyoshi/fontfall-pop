<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>知らんフォント</title>
<style>
  body { margin:0; background:#111; font-family:sans-serif; color:white; overflow:hidden; }
  canvas { display:block; margin:0 auto; background:#000; touch-action:none; }
  
  #startScreen, #clearScreen { 
    position:absolute; top:0; left:0; right:0; bottom:0; 
    display:flex; flex-direction:column; justify-content:center; align-items:center; 
    z-index:100; text-align:center; background:rgba(0,0,0,0.95); pointer-events:all;
  }
  button { padding:20px 70px; font-size:30px; background:#ff66aa; color:white; border:none; border-radius:50px; cursor:pointer; box-shadow:0 10px 0 #cc4488; margin-top:20px; }
  button:active { transform:translateY(6px); box-shadow:0 4px 0 #cc4488; }

  .howto { max-width:680px; text-align:left; font-size:17.5px; line-height:1.6; background:rgba(0,0,0,0.7); padding:20px; border-radius:15px; margin:20px; }

  #ui { position:absolute; top:0; left:0; right:0; z-index:50; pointer-events:none; }
  #level { position:absolute; top:18px; right:180px; font-size:38px; font-weight:bold; color:#ffff66; }
  #score { position:absolute; top:18px; right:25px; font-size:46px; font-weight:bold; color:#ffff66; text-shadow:0 0 15px #ff0; }
  #task { position:absolute; top:68px; left:50%; transform:translateX(-50%); font-size:54px; font-weight:bold; text-shadow:0 0 20px #ff0; }
  #missInfo { position:absolute; top:135px; left:50%; transform:translateX(-50%); font-size:30px; color:#ff6666; font-weight:bold; opacity:0; transition:opacity 0.6s; }
</style>
</head>
<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="startScreen">
  <h1 style="font-size:78px;color:#ff99ee;margin:0;">知らんフォント</h1>
  <p style="font-size:26px;margin:8px 0 20px;">v2.0</p>
  
  <div class="howto">
    <strong>遊び方</strong><br>
    ・左右キー or マウス/指でタコ移動<br>
    ・スペース or タップで墨を撃つ<br><br>
    <strong>ルール</strong><br>
    ・上部の<strong>課題フォント</strong>と同じ書体の文字を撃とう！<br>
    ・<span style="color:#ffee44">黄色い文字</span>を中心に、正しい書体の文字を撃つと高得点<br>
    ・正しいフォントをたくさん撃つと次のフォントへ
  </div>

  <button onclick="startGame()">▶ ゲームスタート</button>
</div>
